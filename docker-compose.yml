services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - ${ENV_FILE_PATH:-.env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./:/workspace:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bonga_admin} -d ${POSTGRES_DB:-bongadb}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
